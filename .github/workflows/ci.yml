name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: contracts
        run: npm install
      - name: Compile
        working-directory: contracts
        run: npm run compile
      - name: Test
        working-directory: contracts
        run: npm test

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # workspaces: sdk + tools + apps/*
      - name: Install
        run: npm install
      - name: Build SDK
        run: npm run build:sdk
      - name: Tools typecheck
        run: npm run typecheck -w @cwr/tools
      - name: Price oracle typecheck
        run: npm run typecheck -w @cwr/price-oracle
      - name: Build app
        run: npm run build -w @cwr/app
      - name: Build landing
        run: npm run build -w @cwr/landing
